name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and dev tools
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Ruff (lint)
        run: ruff check .

      - name: Mypy
        run: mypy fair_ros

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Core is version-agnostic (subprocess + stdlib); no ROS in CI.
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test tools
        run: |
          python -m pip install --upgrade pip
          # Editable install pulls runtime deps from setup.py and validates
          # packaging; the test extra adds pytest and rocrate (rocrate gates
          # the crate-validation integration test).
          pip install -e '.[test]'

      # The real-bag tests (tests/integration/test_real_bags.py) skip cleanly
      # when tests/fixtures/ has no bags. That keeps a fresh checkout green, but
      # it also means deleting the committed Jazzy fixtures would silently turn
      # real-schema validation into a no-op while CI stayed green. Fail loudly
      # instead, so the version-9 parse/health/crate path stays gated.
      - name: Verify real-bag fixtures are present
        run: |
          test -f tests/fixtures/real_mcap/metadata.yaml
          test -f tests/fixtures/real_mcap/real_mcap_0.mcap
          test -f tests/fixtures/real_sqlite3/metadata.yaml
          test -f tests/fixtures/real_sqlite3/real_sqlite3_0.db3

      - name: Run test suite
        run: python -m pytest tests/ -v
