name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Core is version-agnostic (subprocess + stdlib); no ROS in CI.
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test tools
        run: |
          python -m pip install --upgrade pip
          # Editable install pulls runtime deps from setup.py and validates
          # packaging; rocrate gates the crate-validation integration test.
          pip install -e .
          pip install pytest rocrate

      - name: Run test suite
        run: python -m pytest tests/ -v
