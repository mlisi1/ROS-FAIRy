name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and dev tools
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Ruff (lint)
        run: ruff check .

      - name: Mypy (advisory)
        # Type checking is informational for now: the existing codebase has
        # known typing gaps being triaged. It must not block merges yet.
        continue-on-error: true
        run: mypy fair_ros

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Core is version-agnostic (subprocess + stdlib); no ROS in CI.
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test tools
        run: |
          python -m pip install --upgrade pip
          # Editable install pulls runtime deps from setup.py and validates
          # packaging; the test extra adds pytest and rocrate (rocrate gates
          # the crate-validation integration test).
          pip install -e '.[test]'

      - name: Run test suite
        run: python -m pytest tests/ -v
